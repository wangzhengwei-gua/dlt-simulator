name: 爬取开奖数据并部署

on:
  push:
    branches:
      - main
      - master
  schedule:
    # 排列三 20:30、双色球 21:15 开奖；21:35 起每半小时重试一次
    # 脚本会自动判断：抓到最新数据后，后续重试因无新数据而跳过写入（不产生重复提交）
    # UTC 时间 = 北京时间 - 8h
    - cron: '35 13 * * *'   # 北京 21:35 首次
    - cron: '5 14 * * *'    # 北京 22:05
    - cron: '35 14 * * *'   # 北京 22:35
    - cron: '5 15 * * *'    # 北京 23:05
    - cron: '35 15 * * *'   # 北京 23:35
    # 次日早上补爬：防止昨晚 schedule 被 GitHub 高峰时段丢弃后数据缺失
    # 脚本已移除"非开奖日跳过"逻辑，无新数据时自动跳过写入，不会产生无意义提交
    - cron: '15 1 * * *'    # 北京 09:15 补爬
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 允许提交数据更新

jobs:
  crawl:
    name: 爬取开奖号码
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        run: python scripts/crawler.py

      - name: 提交数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 提交所有彩种的数据文件（dlt=latest.json / ssq.json / pl3.json / pl5.json）
          git add data/latest.json data/ssq.json data/pl3.json data/pl5.json
          git diff --staged --quiet || (git commit -m "chore: 自动更新开奖号码（大乐透/双色球/排列三/排列五） $(date -u '+%Y-%m-%d %H:%M')" && git push)
