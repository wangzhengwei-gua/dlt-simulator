name: 爬取开奖数据并部署

on:
  push:
    branches:
      - main
      - master
  schedule:
    # 大乐透(周一/三/六)、双色球(周二/四/日)、排列三(每日)开奖
    # 统一在北京时间每天 21:35 执行（UTC 13:35），覆盖三种彩种
    - cron: '35 13 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 允许提交数据更新

jobs:
  crawl:
    name: 爬取开奖号码
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        run: python scripts/crawler.py

      - name: 提交数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 提交所有彩种的数据文件（dlt=latest.json / ssq.json / pl3.json）
          git add data/latest.json data/ssq.json data/pl3.json
          git diff --staged --quiet || (git commit -m "chore: 自动更新开奖号码（大乐透/双色球/排列三） $(date -u '+%Y-%m-%d %H:%M')" && git push)
