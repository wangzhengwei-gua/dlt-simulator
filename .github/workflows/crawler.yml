name: 爬取开奖数据并部署

on:
  push:
    branches:
      - main
      - master
  schedule:
    # 北京时间每周一、三、六 21:30 执行（UTC 13:30）
    # 大乐透开奖日为周一、三、六
    - cron: '30 13 * * 1,3,6'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 允许提交数据更新

jobs:
  crawl:
    name: 爬取开奖号码
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        run: python scripts/crawler.py

      - name: 提交数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git commit -m "chore: 自动更新大乐透开奖号码 $(date -u '+%Y-%m-%d %H:%M')" || echo "无数据更新"
          git push
