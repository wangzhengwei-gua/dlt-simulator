<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摇号模拟器 · 大乐透 / 双色球 / 排列三</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <header>
            <h1 id="pageTitle">🎰 摇号模拟器</h1>
            <p class="subtitle">模拟摇号 · 历史号码查询 · 自动更新</p>
        </header>

        <nav class="tabs">
            <button class="tab active" data-type="dlt">🎲 大乐透</button>
            <button class="tab" data-type="ssq">🔴 双色球</button>
            <button class="tab" data-type="pl3">🎯 排列三</button>
        </nav>

        <section class="lottery-stage" id="lotteryStage">
            <!-- 球区由 JS 动态生成 -->
        </section>

        <section class="result-display">
            <p class="result-text" id="resultText">点击下方按钮开始摇号</p>
        </section>

        <section class="controls">
            <button id="drawBtn" class="btn btn-primary">🎲 开始摇号</button>
            <button id="resetBtn" class="btn btn-secondary">🔄 重置</button>
        </section>

        <section class="latest-result">
            <h2>📡 最新开奖号码</h2>
            <div id="latestContent" class="card">
                <p class="loading">加载中...</p>
            </div>
        </section>

        <section class="history">
            <h2>📜 最近开奖记录</h2>
            <div id="historyContent" class="card">
                <p class="loading">加载中...</p>
            </div>
        </section>

        <footer>
            <p>本软件仅供娱乐模拟，与官方开奖无关 · 数据来源：500彩票网</p>
        </footer>
    </div>

    <script src="js/simulator.js"></script>
</body>
</html>
